name: Build & Release APK

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Trigger EAS Build & Wait
        run: eas build -p android --profile preview --non-interactive --wait --json > build.json

      - name: Extract APK URL
        run: |
          # The JSON is an array of build objects. We get the first one's buildUrl
          APK_URL=$(jq -r '.[0].artifacts.buildUrl' build.json)
          echo "APK_URL=$APK_URL" >> $GITHUB_ENV

      - name: Download APK
        run: curl -L $APK_URL -o RepBook.apk

      - name: Create GitHub Release & Upload APK
        uses: softprops/action-gh-release@v2
        with:
          files: RepBook.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
