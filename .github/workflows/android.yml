name: Build & Release APK

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Trigger EAS Build & Wait
        run: |
          eas build -p android --profile preview --non-interactive --wait --json > build.json
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Extract APK URL
        run: |
          APK_URL=$(jq -r '.[0].artifacts.buildUrl' build.json)
          if [ -z "$APK_URL" ] || [ "$APK_URL" = "null" ]; then
            echo "❌ Failed to extract APK URL. Full build.json:"
            cat build.json
            exit 1
          fi
          echo "APK_URL=$APK_URL" >> $GITHUB_ENV

      - name: Download APK
        run: |
          curl -fL "$APK_URL" -o RepBook-${{ github.ref_name }}.apk

      - name: Create GitHub Release & Upload APK
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          files: RepBook-${{ github.ref_name }}.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
